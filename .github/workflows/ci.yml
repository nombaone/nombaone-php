name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, mbstring, curl
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Coding standard (PHP-CS-Fixer)
        run: composer cs:check

      - name: Static analysis (PHPStan)
        run: composer phpstan

      - name: Unit & conformance tests
        run: composer test

  # Merge-triggered release: when `main` is green and src/Version.php names a
  # version with no matching tag yet, push `vX.Y.Z`. Packagist ingests the tag
  # via its webhook. Bumping the version line and merging is the whole ritual;
  # a merge that doesn't bump the version is a no-op.
  tag:
    name: Auto-tag release
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from src/Version.php
        id: version
        run: |
          VERSION=$(grep -oE "FALLBACK = '[0-9]+\.[0-9]+\.[0-9]+'" src/Version.php | grep -oE "[0-9]+\.[0-9]+\.[0-9]+")
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read a version from src/Version.php" && exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if new
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists — no release."
            exit 0
          fi
          echo "Releasing ${TAG}"
          git tag "${TAG}"        # lightweight tag: no tagger identity recorded
          git push origin "${TAG}"
